<div class="forgot-password-container">
  <mat-card>
    <div class="logo-container">
      <img src="assets/images/logo.svg" alt="Logo Syndicale" class="forgot-password-logo">
    </div>
    <div class="forgot-password-header">
      <h1>{{ 'AUTH.FORGOT_PASSWORD_TITLE' | translate }}</h1>
      <p>{{ 'AUTH.FORGOT_SUBTITLE' | translate }}</p>
    </div>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="forgot-password-form">
      <mat-form-field appearance="outline">
        <mat-label>{{ 'AUTH.EMAIL' | translate }}</mat-label>
        <input matInput type="email" formControlName="email" [placeholder]="'AUTH.FORGOT_EMAIL_PLACEHOLDER' | translate">
        <mat-error *ngIf="forgotPasswordForm.get('email')?.hasError('required')">
          {{ 'AUTH.EMAIL_REQUIRED' | translate }}
        </mat-error>
        <mat-error *ngIf="forgotPasswordForm.get('email')?.hasError('email')">
          {{ 'AUTH.EMAIL_INVALID' | translate }}
        </mat-error>
      </mat-form-field>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="loading || forgotPasswordForm.invalid">
        <span *ngIf="!loading">{{ 'AUTH.SEND_CODE' | translate }}</span>
        <mat-spinner *ngIf="loading" diameter="20" style="display: inline-block; margin: 0 auto;"></mat-spinner>
      </button>
    </form>

    <div class="form-footer">
      <a routerLink="/auth/login">{{ 'AUTH.BACK_TO_LOGIN' | translate }}</a>
    </div>
  </mat-card>
</div>
