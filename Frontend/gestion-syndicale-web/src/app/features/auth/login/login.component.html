<div class="login-container">
  <mat-card>
    <div class="logo-container">
      <img src="assets/images/logo.svg" alt="Logo Syndicale" class="login-logo">
    </div>
    <!-- <div class="residence-name">
      <h2>{{ residenceName }}</h2>
    </div> -->
    <div class="login-header">
      <h1>Connexion</h1>
      <p>Syndical</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="admin@residence.com">
        <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
          L'email est requis
        </mat-error>
        <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
          Email invalide
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Mot de passe</mat-label>
        <input matInput type="password" formControlName="password" placeholder="••••••••">
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          Le mot de passe est requis
        </mat-error>
        <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
          Minimum 6 caractères
        </mat-error>
      </mat-form-field>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="loading || loginForm.invalid">
        <span *ngIf="!loading">Se connecter</span>
        <mat-spinner *ngIf="loading" diameter="20" style="display: inline-block; margin: 0 auto;"></mat-spinner>
      </button>
    </form>

    <div class="form-footer">
      <a routerLink="/auth/register">Créer un compte</a>
      <span style="margin: 0 10px;">|</span>
      <a routerLink="/auth/forgot-password">Mot de passe oublié?</a>
    </div>
  </mat-card>
</div>
