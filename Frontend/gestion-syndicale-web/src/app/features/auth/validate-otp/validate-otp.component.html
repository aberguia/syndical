<div class="validate-otp-container">
  <mat-card>
    <div class="logo-container">
      <img src="assets/images/logo.svg" alt="Logo Syndicale" class="validate-otp-logo">
    </div>
    <div class="validate-otp-header">
      <h1>{{ 'AUTH.OTP_VALIDATION_TITLE' | translate }}</h1>
      <p>{{ 'AUTH.OTP_SENT_TO' | translate }} <strong>{{ email }}</strong></p>
    </div>

    <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="validate-otp-form">
      <mat-form-field appearance="outline">
        <mat-label>{{ 'AUTH.OTP_CODE' | translate }}</mat-label>
        <input matInput formControlName="otpCode" [placeholder]="'AUTH.OTP_PLACEHOLDER' | translate" maxlength="6">
        <mat-error *ngIf="otpForm.get('otpCode')?.hasError('required')">
          {{ 'AUTH.OTP_CODE_REQUIRED' | translate }}
        </mat-error>
        <mat-error *ngIf="otpForm.get('otpCode')?.hasError('pattern')">
          {{ 'AUTH.OTP_CODE_DIGITS' | translate }}
        </mat-error>
      </mat-form-field>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <button mat-raised-button color="primary" type="submit" [disabled]="loading || otpForm.invalid">
        <span *ngIf="!loading">{{ 'AUTH.OTP_BTN' | translate }}</span>
        <mat-spinner *ngIf="loading" diameter="20" style="display: inline-block; margin: 0 auto;"></mat-spinner>
      </button>

      <button mat-button type="button" (click)="resendOtp()" [disabled]="loading" class="resend-button">
        {{ 'AUTH.RESEND_CODE' | translate }}
      </button>
    </form>

    <div class="form-footer">
      <a routerLink="/auth/login">{{ 'AUTH.BACK_TO_LOGIN' | translate }}</a>
    </div>
  </mat-card>
</div>
