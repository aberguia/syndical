<h2 mat-dialog-title>Modifier la Note</h2>

<mat-dialog-content>
  <div class="note-context">
    <div class="context-row">
      <span class="label">Adhérent :</span>
      <span class="value">{{ data.memberFullName }}</span>
    </div>
    <div class="context-row">
      <span class="label">Immeuble :</span>
      <span class="value">{{ data.buildingCodeOrName }}</span>
    </div>
    <div class="context-row">
      <span class="label">Appartement :</span>
      <span class="value">{{ data.apartmentNumber }}</span>
    </div>
  </div>

  <mat-divider style="margin: 16px 0;"></mat-divider>

  <form [formGroup]="noteForm" class="note-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Note *</mat-label>
      <textarea 
        matInput 
        formControlName="noteText" 
        rows="8"
        maxlength="4000"></textarea>
      <mat-hint align="end">{{ noteForm.get('noteText')?.value?.length || 0 }}/4000</mat-hint>
      <mat-error *ngIf="noteForm.get('noteText')?.hasError('required')">
        La note est obligatoire
      </mat-error>
      <mat-error *ngIf="noteForm.get('noteText')?.hasError('maxlength')">
        La note ne doit pas dépasser 4000 caractères
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="loading">Annuler</button>
  <button 
    mat-raised-button 
    color="primary" 
    (click)="onSubmit()" 
    [disabled]="noteForm.invalid || loading">
    <mat-spinner *ngIf="loading" diameter="20" style="display: inline-block; margin-right: 8px;"></mat-spinner>
    Enregistrer
  </button>
</mat-dialog-actions>
